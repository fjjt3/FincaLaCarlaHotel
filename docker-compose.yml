services:
  backend:
    build: ./backend
    container_name: hotel-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    restart: always

  frontend:
    build: ./frontend
    container_name: hotel-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
